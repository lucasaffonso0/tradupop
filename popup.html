<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
  <title>TradupPop</title>
</head>
<body>
  <div class="panel">

    <div class="panel-header">
      <img src="icons/icon48.png" class="panel-logo" alt="TradupPop">
      <div class="panel-header-text">
        <div class="panel-title">TradupPop</div>
        <div class="panel-subtitle" id="lbl-panelSubtitle">Painel de controle</div>
      </div>
      <button id="supportHeartBtn" class="header-support-btn" style="display:none" title="">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span id="lbl-supportProject">Apoiar projeto</span>
      </button>
      <button id="tvSettingsBtn" class="tv-settings-btn" style="display:none" title="">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>

    <!-- Card de apoio (expande do ❤ do cabeçalho) -->
    <div class="header-support-card" id="headerSupportCard" style="display:none">
      <div class="hs-msg" id="hsMsg"></div>
      <div class="hs-label" id="hsPixLabel">Chave Pix</div>
      <code class="hs-key" id="hsPixKey"></code>
      <button class="hs-copy" id="hsCopyBtn" type="button">
        <span id="lbl-hsCopy">Copiar chave Pix</span>
      </button>
      <div class="hs-feedback" id="hsFeedback" role="status" aria-live="polite"></div>
      <button class="hs-donate" id="hsDonateBtn" type="button" style="display:none">
        <span aria-hidden="true">☕</span>
        <span id="lbl-hsDonate">Fazer uma doação</span>
      </button>
    </div>

    <!-- Tradução da seleção (modo ícone) -->
    <div class="panel-section translation-view" id="translationView" style="display:none">
      <div class="tv-header">
        <div class="tv-title-wrap">
          <span class="tv-lang-tag" id="tvSourceLang"></span>
          <div class="tv-source" id="tvSource"></div>
          <div class="tv-phonetic" id="tvPhonetic" style="display:none"></div>
        </div>
        <div class="tv-actions">
          <button id="tvSpeakBtn" class="tv-speak" title="">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 10v4h4l5 4V6L7 10H3zm13.5 2a3.5 3.5 0 0 0-2.1-3.2v6.4a3.5 3.5 0 0 0 2.1-3.2zm0-7a1 1 0 0 0 0 2c2.8 0 5 2.2 5 5s-2.2 5-5 5a1 1 0 0 0 0 2c3.9 0 7-3.1 7-7s-3.1-7-7-7z"/></svg>
          </button>
          <button id="tvSpeakSlowBtn" class="tv-speak slow" title="">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 10v4h4l5 4V6L7 10H3zm13.5 2a3.5 3.5 0 0 0-2.1-3.2v6.4a3.5 3.5 0 0 0 2.1-3.2z"/></svg>
          </button>
        </div>
      </div>
      <div class="tv-card">
        <div class="tv-card-body">
          <span class="tv-lang-tag" id="tvTargetLang"></span>
          <div><span class="tv-target" id="tvTarget"></span></div>
          <div class="tv-alts" id="tvAlts" style="display:none"></div>
        </div>
        <button id="tvSaveBtn" class="tv-save" title="">
          <svg viewBox="0 0 24 24" aria-hidden="true"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </button>
      </div>
      <div class="tv-defs" id="tvDefs" style="display:none"></div>
      <div class="tv-toast" id="tvToast" role="status" aria-live="polite"></div>
    </div>

    <!-- Idioma da interface -->
    <div class="panel-section">
      <div class="section-row">
        <div class="row-label">
          <svg class="row-icon" viewBox="0 0 24 24"><path d="M5 8l6 6M4 14l6-6 2-3M2 5h12M7 2h1M22 22l-5-10-5 10M14 18h6"/></svg>
          <span id="lbl-uiLang">Idioma da interface</span>
        </div>
        <select id="uiLangSelect" class="lang-select" style="width:auto;min-width:120px">
          <option value="pt">🇧🇷 Português</option>
          <option value="en">🇺🇸 English</option>
          <option value="es">🇪🇸 Español</option>
          <option value="fr">🇫🇷 Français</option>
          <option value="de">🇩🇪 Deutsch</option>
        </select>
      </div>
    </div>

    <!-- Dark mode -->
    <div class="panel-section">
      <div class="section-row">
        <div class="row-label">
          <svg class="row-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <span id="lbl-darkMode">Modo escuro</span>
        </div>
        <label class="toggle">
          <input type="checkbox" id="darkModeToggle">
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>
      </div>
    </div>

    <!-- Idiomas -->
    <div class="panel-section">
      <div class="section-title">
        <svg class="row-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        <span id="lbl-langsTitle">Idiomas</span>
      </div>
      <div class="lang-row">
        <div class="lang-group">
          <label class="lang-label" id="lbl-langFrom">De</label>
          <select id="sourceLang" class="lang-select">
            <option value="en">🇺🇸 Inglês</option>
            <option value="pt">🇧🇷 Português</option>
            <option value="es">🇪🇸 Espanhol</option>
            <option value="fr">🇫🇷 Francês</option>
            <option value="de">🇩🇪 Alemão</option>
            <option value="it">🇮🇹 Italiano</option>
            <option value="ja">🇯🇵 Japonês</option>
            <option value="zh">🇨🇳 Chinês</option>
            <option value="ko">🇰🇷 Coreano</option>
            <option value="ru">🇷🇺 Russo</option>
          </select>
        </div>
        <button id="swapLangBtn" class="btn-swap" title="Trocar idiomas">⇄</button>
        <div class="lang-group">
          <label class="lang-label" id="lbl-langTo">Para</label>
          <select id="targetLang" class="lang-select">
            <option value="pt">🇧🇷 Português</option>
            <option value="en">🇺🇸 Inglês</option>
            <option value="es">🇪🇸 Espanhol</option>
            <option value="fr">🇫🇷 Francês</option>
            <option value="de">🇩🇪 Alemão</option>
            <option value="it">🇮🇹 Italiano</option>
            <option value="ja">🇯🇵 Japonês</option>
            <option value="zh">🇨🇳 Chinês</option>
            <option value="ko">🇰🇷 Coreano</option>
            <option value="ru">🇷🇺 Russo</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Onde mostrar a tradução -->
    <div class="panel-section">
      <div class="section-title">
        <svg class="row-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6v6H9z"/></svg>
        <span id="lbl-popupModeTitle">Onde mostrar a tradução</span>
      </div>
      <div class="mode-cards" id="popupModeCards" role="radiogroup" aria-labelledby="lbl-popupModeTitle">
        <button type="button" class="mode-card" data-value="page" role="radio" aria-checked="false">
          <svg class="mode-card-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M7 7h7M7 10h4"/><rect x="9" y="13" width="10" height="6" rx="1.5"/></svg>
          <span class="mode-card-label" id="opt-popupModePage">Na página</span>
          <svg class="mode-card-check" viewBox="0 0 24 24" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
        <button type="button" class="mode-card" data-value="icon" role="radio" aria-checked="false">
          <svg class="mode-card-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 8h18"/><circle cx="17.5" cy="5.5" r="0.5"/><rect x="11" y="11" width="9" height="6" rx="1.5"/><path d="M17.5 8v3"/></svg>
          <span class="mode-card-label" id="opt-popupModeIcon">No ícone da extensão</span>
          <svg class="mode-card-check" viewBox="0 0 24 24" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
      </div>
      <div class="mode-hint" id="iconModeHintWrap" style="display:none">
        <svg class="mode-hint-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 16v-5M12 8h.01"/></svg>
        <div class="mode-hint-body">
          <span id="lbl-iconModeHint"></span>
          <button id="openShortcutsBtn" class="mode-hint-link" type="button">
            <span id="lbl-configureShortcut">Configurar atalho do navegador</span>
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 17L17 7M9 7h8v8"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Atalho -->
    <div class="panel-section">
      <div class="section-title">
        <svg class="row-icon" viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="13" rx="2"/><path d="M6 10h.01M10 10h.01M14 10h.01M18 10h.01M8 14h8"/></svg>
        <span id="lbl-shortcutTitle">Atalho para falar seleção</span>
      </div>
      <div class="shortcut-row">
        <span class="shortcut-badge">Ctrl</span>
        <span class="shortcut-plus">+</span>
        <input type="text" id="shortcutInput" class="shortcut-input" maxlength="1" placeholder="Q">
        <button id="saveShortcutBtn" class="btn-primary" data-i18n="save">Salvar</button>
      </div>
      <div id="shortcutFeedback" class="feedback"></div>
    </div>

    <!-- Vocabulário -->
    <div class="panel-section">
      <button id="openVocabBtn" class="btn-vocab-open">
        <div class="btn-vocab-left">
          <svg class="row-icon star-icon" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          <span id="lbl-savedWordsTitle">Palavras salvas</span>
          <span id="wordCount" class="badge">0</span>
        </div>
        <div class="btn-vocab-right">
          <span id="lbl-openVocab">Abrir</span>
          <svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </div>
      </button>
      <div id="duePill" class="due-pill" style="display:none">
        <span id="dueCount">0</span> <span id="lbl-dueForReview">para revisar</span>
      </div>
    </div>

  </div>
  <script src="ui-strings.js"></script>
  <script src="popup.js"></script>
</body>
</html>
