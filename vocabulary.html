<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="vocabulary.css">
  <title>TradupPop — Vocabulário</title>
</head>
<body>

  <div class="app" id="app">

    <!-- Header -->
    <header class="app-header">
      <div class="header-brand">
        <img src="icons/icon48.png" class="header-logo" alt="TradupPop">
        <div class="header-text">
          <span class="header-title">TradupPop</span>
          <span class="header-sub" id="lbl-vocabTitle">Vocabulário</span>
        </div>
      </div>
      <label class="toggle header-toggle" title="Dark mode">
        <input type="checkbox" id="darkToggle">
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
      </label>
    </header>

    <!-- Stats bar -->
    <div class="stats-bar">
      <div class="stat-pill">
        <span class="stat-num" id="statTotal">0</span>
        <span class="stat-label" id="lbl-statWords">palavras</span>
      </div>
      <div class="stat-pill stat-pill--due">
        <span class="stat-num" id="statDue">0</span>
        <span class="stat-label" id="lbl-statDue">para revisar</span>
      </div>
      <div class="stat-pill stat-pill--mastered">
        <span class="stat-num" id="statMastered">0</span>
        <span class="stat-label" id="lbl-statMastered">dominadas</span>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab tab--active" id="tabList" data-tab="list">
        <svg viewBox="0 0 24 24" class="tab-icon"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
        <span id="lbl-tabList">Lista</span>
      </button>
      <button class="tab" id="tabPractice" data-tab="practice">
        <svg viewBox="0 0 24 24" class="tab-icon"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        <span id="lbl-tabPractice">Praticar</span>
        <span class="tab-badge" id="dueBadge" style="display:none">0</span>
      </button>
    </div>

    <!-- ─── VIEW: Lista ─── -->
    <div id="viewList" class="view">

      <div class="list-toolbar">
        <input type="text" id="wordSearch" class="search-input" placeholder="Buscar palavra...">
        <div class="toolbar-btns">
          <button id="importBtn" class="btn-tool" title="Importar JSON">
            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <span id="lbl-import">Importar</span>
          </button>
          <input type="file" id="importFile" accept=".json" style="display:none">
          <button id="exportBtn" class="btn-tool" title="Exportar JSON">
            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            <span id="lbl-export">Exportar</span>
          </button>
          <button id="clearAllBtn" class="btn-tool btn-tool--danger" title="Limpar tudo">
            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            <span id="lbl-clearAll">Limpar tudo</span>
          </button>
        </div>
      </div>

      <div id="importFeedback" class="import-feedback" style="display:none"></div>

      <div id="wordList" class="word-list"></div>

      <div id="emptyState" class="empty-state">
        <div class="empty-icon">📚</div>
        <p class="empty-title" id="lbl-noWords">Nenhuma palavra salva ainda.</p>
        <p class="empty-hint" id="lbl-noWordsHint">Selecione palavras nas páginas e clique ★ para salvar.</p>
      </div>

      <div id="undoToast" class="undo-toast" style="display:none">
        <span id="undoMsg"></span>
        <button id="undoBtn" class="undo-btn"></button>
      </div>

    </div>

    <!-- ─── VIEW: Praticar ─── -->
    <div id="viewPractice" class="view" style="display:none">
      <div id="practiceContent"></div>
    </div>

  </div>

  <script src="ui-strings.js"></script>
  <script src="vocabulary.js"></script>
</body>
</html>
